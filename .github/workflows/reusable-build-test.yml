name: Reusable Build Test Pipeline

on:

  workflow_call:

    inputs:

      python_version:
        required: true
        type: string

      run_tests:
        required: false
        type: boolean
        default: true

    outputs:

      test_result:
        description: "Test status"
        value: ${{ jobs.build.outputs.result }}

jobs:

  build:

    runs-on: ubuntu-latest

    outputs:
      result: ${{ steps.test_status.outputs.result }}

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python

      uses: actions/setup-python@v5

      with:
        python-version: ${{ inputs.python_version }}

    - name: Upgrade pip

      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies

      run: |

        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

        pip install flake8 bandit black

# ---------------- LINT ----------------

    - name: Lint Code

      run: |

        echo "Running flake8"

        flake8 . --max-line-length=120 || true \
        --count \
        --select=E9,F63,F7,F82 \
        --show-source \
        --statistics

# ---------------- FORMAT CHECK ----------------

    - name: Format Check

      run: |
        black --check .

# ---------------- SECURITY LINT ----------------

    - name: Security Scan

      run: |
        bandit -r . -ll

# ---------------- TEST ----------------

    - name: Run Tests

      if: inputs.run_tests == true

      run: |

        chmod +x test.sh

        ./test.sh

# ---------------- OUTPUT ----------------

    - name: Set Test Result

      id: test_status

      run: |
        echo "result=passed" >> $GITHUB_OUTPUT