name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  GITHUB_SHA: ${{ github.sha }}

jobs:

# ---------------- BUILD & TEST ----------------

  build-test:

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      python_version: "3.11"
      run_tests: true

# ---------------- DOCKER BUILD ----------------

  docker:

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: github-actions-capstone
      tag: latest

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

# ---------------- SECURITY SCAN ----------------

  security-scan:

    runs-on: ubuntu-latest

    needs: docker

    steps:

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.20.0

        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3

        with:
          sarif_file: trivy-results.sarif

# ---------------- SBOM ----------------

  sbom:

    runs-on: ubuntu-latest

    needs: security-scan

    steps:

      - name: Generate SBOM
        uses: anchore/sbom-action@v0

        with:
          image: ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest
          format: spdx-json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4

        with:
          name: sbom-report
          path: sbom.json

# ---------------- IMAGE SIGNING ----------------

  sign:

    runs-on: ubuntu-latest

    needs: sbom

    steps:

      - name: Login Docker
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image

        env:
          COSIGN_YES: "true"

        run: |
          cosign generate-key-pair

          cosign sign \
          --key cosign.key \
          ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest
          
# ---------------- DEPLOY ----------------

  deploy:

    runs-on: ubuntu-latest

    needs: sign

    environment: production

    steps:

      - name: Deploy info
        run: |
          echo "Deploying secure image"
          echo "Image:"
          echo "${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest"