name: Smart Pipeline

on:
  push:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Lint Code
        run: echo "Linting code..."

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Run Tests
        run: echo "Running tests..."


    summery:
      runs-on: ubuntu-latest
      needs: [lint, test]

      steps:
        - name: Branch Info
          run: |
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]
            then
              echo "Main Branch Push"
            else
              echo "Feature Branch Push"
            fi

        - name: Commit Message
          run: echo "Commit message: ${{ github.event.head_commit.message }}"