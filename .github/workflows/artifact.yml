name: Artifact Transfer

on:
  push:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: echo "Hello from Job1" > file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4

        with:
          name: shared-file
          path: file.txt

  use-artifact:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Download artifact
        uses: actions/download-artifact@v4

        with:
          name: shared-file

      - name: Show content
        run: cat file.txt